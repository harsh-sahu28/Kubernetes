kind: Service
apiVersion: v1
metadata:
  name: mysql-service
  namespace: bankapp
spec:
  selector:
    app: mysql
  ports:
    - port: 3306

---

kind: Service
apiVersion: v1
metadata:
  name: ollama-service
  namespace: bankapp
spec:
  selector:
    app: ollama
  ports:
    - port: 11434

---

kind: Service
apiVersion: v1
metadata:
  name: bankapp-service
  namespace: bankapp
spec:
  type: NodePort
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: bankapp
  ports:
    - port: 8080
      nodePort: 30080
